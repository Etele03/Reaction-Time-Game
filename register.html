<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regisztráció | Reflex Teszt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">Reflex<span class="text-pale">App</span></a>
        <nav>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Vissza a főoldalra</a></li>
            </ul>
        </nav>
    </header>

    <main class="form-page">
        <div class="form-container">
            <h2>Hozd létre a <span class="text-blue">fiókod</span></h2>
            
            <form id="register-form">
                <div class="input-group">
                    <label for="username">Felhasználónév</label>
                    <input type="text" id="username" placeholder="pl. VillamKeze23" required minlength="3">
                </div>

                <div class="input-group">
                    <label for="email">E-mail cím</label>
                    <input type="email" id="email" placeholder="pelda@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Jelszó</label>
                    <input type="password" id="password" placeholder="Legalább 6 karakter" required minlength="6">
                </div>

                <div class="input-group">
                    <label for="confirm-password">Jelszó újra</label>
                    <input type="password" id="confirm-password" placeholder="Jelszó megerősítése" required minlength="6">
                </div>

                <div id="error-message" class="error-text"></div>

                <button type="submit" class="btn btn-primary btn-full">Regisztráció</button>
            </form>

            <p class="form-footer">
                Már van fiókod? <a href="login.html" class="text-neon">Jelentkezz be!</a>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ReflexApp. Projektmunka.</p>
    </footer>

    <script src="register.js" defer></script>
</body>
</html>
